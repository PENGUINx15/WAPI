plugins {
    id 'java'
}

group = 'com.github.PENGUINx15'
version = '2.0.0'

dependencies {
    compileOnly project(':wapi-paper')
    compileOnly project(':wapi-commands')
    compileOnly project(':wapi-commands-paper')
    compileOnly project(':wapi-orm')
    compileOnly project(':wapi-enchants')

    compileOnly 'io.papermc.paper:paper-api:1.19.4-R0.1-SNAPSHOT'
}

processResources {
    def props = [version: project.version]
    inputs.properties props
    filteringCharset 'UTF-8'
    filesMatching('plugin.yml') { expand props }
}
